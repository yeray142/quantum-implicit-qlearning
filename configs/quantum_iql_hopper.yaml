# configs/quantum_iql_hopper.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Shared config for the hybrid Q-IQL ablation on Hopper-medium-v0.
# Switch between classical and quantum arms with a single override:
#
#   mode=classical   → standard IQL with MLP value network
#   mode=quantum     → DRU quantum circuit replaces V(s); Q and π stay classical
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Execution mode ────────────────────────────────────────────────────────────
mode: "classical"   # "classical" | "quantum"  — override from CLI

# ── Environment / Data ────────────────────────────────────────────────────────
dataset_id: "mujoco/hopper/medium-v0"
env_id: "Hopper-v4"

# ── IQL hyperparameters ───────────────────────────────────────────────────────
tau: 0.7        # expectile level (0.5 = MSE; 0.9+ for AntMaze)
beta: 3.0       # advantage inverse temperature
gamma: 0.99
polyak: 0.005

# ── Optimisation ──────────────────────────────────────────────────────────────
lr_v: 3.0e-4
lr_q: 3.0e-4
lr_actor: 3.0e-4
lr_quantum: 1.0e-3      # dedicated lr for quantum parameters (often needs higher lr)
quantum_grad_clip: 1.0  # max-norm clipping applied to quantum params only

batch_size: 256
num_steps: 1_000_000
warmup_steps: 0

# ── Classical networks (Q and π always classical; V when mode=classical) ───────
value_net:
  hidden_dims: [256, 256]
  activation: relu
  layer_norm: false

critic_net:
  hidden_dims: [256, 256]
  activation: relu
  layer_norm: false

actor_net:
  hidden_dims: [256, 256]
  activation: relu
  layer_norm: false

use_twin_critic: true
advantage_clip: 100.0

# ── Quantum value network (used when mode=quantum) ───────────────────────────
quantum_value:
  n_qubits: 8
  n_layers: 3              # must satisfy n_layers <= floor(log2(n_qubits)) = 3
  # backprop+default.qubit: converts circuit to PyTorch ops → runs on GPU.
  # 152x faster than adjoint on CPU (RTX 5070: 0.028s/step vs 4.3s/step, B=256).
  device_name: "default.qubit"
  diff_method: "backprop"
  running_stats: true

  # Layerwise warm-up schedule (Skolik et al., 2021)
  # Activates DRU layers progressively to avoid BP at initialisation.
  layerwise_schedule:
    - start_step: 0
      active_layers: 1
    - start_step: 100000
      active_layers: 2
    - start_step: 300000
      active_layers: 3

# ── Quantum diagnostics ───────────────────────────────────────────────────────
log_quantum_metrics: true
stats_update_interval: 1000    # refresh arctan encoding μ/σ every 1k steps

# ── Logging ───────────────────────────────────────────────────────────────────
log_interval: 1000
eval_interval: 10000
eval_episodes: 10
wandb_project: "quantum-iql"
wandb_run_name: null          # auto-generated if null
wandb_offline: false

# ── Reproducibility ───────────────────────────────────────────────────────────
seed: 0
device: "auto"
